<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.15" r="0.4">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.95" r="0.4">
      <stop offset="0" stop-color="#84CC16" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#84CC16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- BlogPilot logo (paper plane) -->
  <g transform="translate(80,80)">
    <path d="M0 60 L80 20 L60 90 L52 65 L0 60Z" fill="#3B82F6" stroke="#84CC16" stroke-width="2"/>
  </g>
  <text x="180" y="125" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">BlogPilot <tspan fill="#60A5FA">AI</tspan></text>
  <text x="180" y="158" font-family="Inter, sans-serif" font-size="18" fill="#94A3B8">Open-source · MIT · v1.0</text>

  <!-- Tagline -->
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">Your clients, your content,</text>
  <text x="80" y="370" font-family="Inter, sans-serif" font-size="64" font-weight="700" fill="url(#headline)">on autopilot.</text>

  <!-- Subhead -->
  <text x="80" y="430" font-family="Inter, sans-serif" font-size="22" fill="#CBD5E1">Replaces $700+/mo of Surfer, Ahrefs, Clearscope, Screaming Frog, AlsoAsked,</text>
  <text x="80" y="460" font-family="Inter, sans-serif" font-size="22" fill="#CBD5E1">MarketMuse with one AI API key. Free. Self-hosted. Open source.</text>

  <!-- Stats row -->
  <g transform="translate(80,520)">
    <g>
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">39</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8" letter-spacing="2">MODULES</text>
    </g>
    <g transform="translate(180,0)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">45</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8" letter-spacing="2">METHODOLOGIES</text>
    </g>
    <g transform="translate(440,0)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">12+</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8" letter-spacing="2">AI PROVIDERS</text>
    </g>
    <g transform="translate(640,0)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="42" font-weight="700" fill="#A3E635">$0</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8" letter-spacing="2">API COST</text>
    </g>
  </g>

  <!-- Dice Codes badge -->
  <g transform="translate(1050,80)">
    <rect x="0" y="0" width="160" height="56" rx="12" fill="#1E293B" stroke="#84CC16" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="14" y="14" width="28" height="28" rx="5" fill="#84CC16"/>
    <circle cx="22" cy="22" r="2.5" fill="#0F172A"/>
    <circle cx="34" cy="34" r="2.5" fill="#0F172A"/>
    <circle cx="28" cy="28" r="2.5" fill="#0F172A"/>
    <text x="52" y="26" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8">built by</text>
    <text x="52" y="42" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Dice Codes</text>
  </g>
</svg>
