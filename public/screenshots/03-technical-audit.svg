<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#1E293B"/></linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>

  <line x1="0" y1="58" x2="1280" y2="58" stroke="#1E293B"/>
