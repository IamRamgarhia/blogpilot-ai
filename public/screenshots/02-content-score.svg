  <!-- Left editor pane -->
  <rect x="60" y="270" width="720" height="500" rx="20" fill="#0F172A" fill-opacity="0.6" stroke="#1E293B"/>
  <g font-size="12" font-family="JetBrains Mono, monospace" fill="#CBD5E1">
    <text x="84" y="300"># Best WordPress SEO Plugins for 2026</text>
    <text x="84" y="320" fill="#94A3B8"></text>
    <text x="84" y="340">## What is a WordPress SEO plugin?</text>
    <text x="84" y="360" fill="#94A3B8"></text>
    <text x="84" y="380">A WordPress SEO plugin is structured-data and</text>
    <text x="84" y="400">on-page tooling that helps a WordPress site rank</text>
    <text x="84" y="420">in Google. The top options handle <tspan fill="#A3E635">schema markup</tspan>,</text>
    <text x="84" y="440"><tspan fill="#A3E635">XML sitemaps</tspan>, meta titles, and canonical tags.</text>
    <text x="84" y="460" fill="#94A3B8"></text>
    <text x="84" y="480">## Top 5 WordPress SEO plugins</text>
    <text x="84" y="500" fill="#94A3B8"></text>
    <text x="84" y="520">1. <tspan fill="#A3E635">Yoast SEO</tspan> — the original. Strong meta + sitemap.</text>
    <text x="84" y="540">2. <tspan fill="#A3E635">Rank Math</tspan> — competitive feature set, fast UI.</text>
    <text x="84" y="560">3. <tspan fill="#A3E635">All in One SEO</tspan> — solid for beginners.</text>
    <text x="84" y="580">4. SEOPress — privacy-friendly, no upsells.</text>
    <text x="84" y="600">5. The SEO Framework — extremely lightweight.</text>
    <text x="84" y="620" fill="#94A3B8"></text>
    <text x="84" y="640">## How to choose</text>
    <text x="84" y="660" fill="#94A3B8"></text>
    <text x="84" y="680">Consider your site type, technical comfort, and</text>
    <text x="84" y="700">whether you need <tspan fill="#FB923C">content scoring</tspan> built-in...</text>
  </g>
