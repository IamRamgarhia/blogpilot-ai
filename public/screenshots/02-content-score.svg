      <text x="836" y="714" font-size="11" font-family="JetBrains Mono" fill="#FB923C">wordpress seo plugin</text>
      <text x="836" y="734" font-size="10" fill="#94A3B8">28× in draft vs median 6× in top-10 — natural prose.</text>
