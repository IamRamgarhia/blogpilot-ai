  <text x="60" y="128" font-size="28" font-weight="700" fill="#FFFFFF">Content Score</text>
  <text x="60" y="150" font-size="13" fill="#94A3B8">Live grading against the top-10 SERP. Pure local TF-IDF — no AI cost.</text>

